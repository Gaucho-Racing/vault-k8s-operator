apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-k8s-operator
  namespace: vault-k8s-operator-system
  labels:
    app.kubernetes.io/name: vault-k8s-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vault-k8s-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-k8s-operator
    spec:
      serviceAccountName: vault-k8s-operator
      containers:
        - name: manager
          image: ghcr.io/gaucho-racing/vault-k8s-operator:1.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --vault-url=$(VAULT_URL)
            - --audience=$(VAULT_AUDIENCE)
          env:
            - name: VAULT_URL
              value: https://vault.gauchoracing.com
            - name: VAULT_AUDIENCE
              value: gaucho-racing-vault
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
