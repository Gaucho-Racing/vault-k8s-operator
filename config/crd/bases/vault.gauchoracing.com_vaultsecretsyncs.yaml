apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vaultsecretsyncs.vault.gauchoracing.com
spec:
  group: vault.gauchoracing.com
  names:
    kind: VaultSecretSync
    listKind: VaultSecretSyncList
    plural: vaultsecretsyncs
    singular: vaultsecretsync
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - target
                - secrets
              properties:
                vaultURL:
                  type: string
                serviceAccountName:
                  type: string
                target:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                secrets:
                  type: object
                  additionalProperties:
                    type: string
                rolloutTargets:
                  type: array
                  items:
                    type: object
                    required:
                      - kind
                      - name
                    properties:
                      kind:
                        type: string
                      name:
                        type: string
                refreshInterval:
                  type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                secretName:
                  type: string
                secretResourceVersion:
                  type: string
                syncedAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Secret
          type: string
          jsonPath: .status.secretName
        - name: Synced
          type: string
          jsonPath: .status.conditions[?(@.type=="Synced")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
